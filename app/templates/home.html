<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

    body {
      background: #ffffff;
    }

    /* Top Navbar */
    .navbar {
      background-color: #ffffff; 
      padding: 8px 16px;
      margin: 0px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-radius: 2px;
    }

    .navbar h2 {
      color: #2563Eb; /* emerald green logo */
      font-weight: 700;
      font-size: 2rem;
      border: 10px red;
      padding: 10px;
      width: auto;
      height: auto;
    }

    /* Hero Card */
    .hero-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px); /* subtract navbar height */
      padding: 30px;
    }

    .hero-card {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .hero-card h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #111827;
    }

    .hero-card p {
      font-size: 1.2rem;
      margin-bottom: 35px;
      color: #4b5563;
    }

    .hero-card a {
      margin: 0.5rem;
      width: 150px;
      font-weight: 500;
      background-color: #2563Eb;
    }

    .hero-card a:hover {
      background-color: #5281e6;
    }

    
    @media(max-width: 390px) {

      /* Top Navbar */
      .navbar {
        display: grid;
        align-items: center;
        justify-content: center;
        
      }

      .navbar h2 {
        display: flex;
        justify-content: center;
        align-items: center;
      }
 
    }



  </style>
</head>
<body>

  <!-- Top Navbar -->
  <div class="navbar">
    <h2>Trading Journal</h2>
  </div>

  <!-- Hero Card -->
  <div class="hero-container">
    <div class="hero-card">
      <h1>Welcome to Trading Journal</h1>
      <p>Track your trades, analyze performance, and grow your portfolio.</p>
      <a href="{{ url_for('main.login') }}" class="btn btn-primary">Login</a>
      <a href="{{ url_for('main.register') }}" class="btn btn-success">Register</a>
    </div>
  </div>

</body>
</html>
