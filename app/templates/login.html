<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
            min-height: 600px;
            height: auto;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

   

        input {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input:focus {
            outline: none;
            border-color: #000000;
        }

        input[type="submit"] {
            background: #2563Eb;
            color: white;
            border: none;
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #5281e6;
        }

        .messages p {
            color: red;
            font-size: 14px;
            text-align: center;
            margin: 0;
            margin-bottom: 5px;
        }

        .signup-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
        }

        .signup-link a {
            color: #2463EB;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: none;
            color: #9eb3e1;
        }

        .forgot-password-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
        }

        .forgot-password-link a{
            color: #2463EB;
            text-decoration: none;
        }

        .forgot-password-link a:hover {
            color: #9eb3e1;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1>Login to Trading Journal</h1>

            <div class="messages">
              {% for message in get_flashed_messages() %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
       

        <form method="POST">
            {{ form.hidden_tag() }}
            {{ form.username() }}
            {{ form.password() }}
            {{ form.submit }}
        </form>

        


        <div class="signup-link">
            <a href="{{ url_for('main.register') }}">Don't have an account? Sign Up</a>
        </div>

        <div class="forgot-password-link">
            <a href="{{ url_for('main.password_reset')}}">Forgot password?</a>
        </div>


    
    </div>
</body>
</html>
