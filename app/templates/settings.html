<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>

        :root {
            --base-clr : white;
            --line-clr: #42434a;
            --hover-clr: #222533;
            --text-clr: #2463EB;
            --accent-clr: #5e63ff;
            --secondart-text-clr: #b0b3c1;
        }

        * {
            padding: 0;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background-color: var(--base-clr);
            color: var(--text-clr);
            display: grid;
            grid-template-columns: auto 1fr;
        }

        #sidebar {
            box-sizing: border-box;
            height: 100vh;
            width: 250px;
            padding: 5px 1px;
            background-color: var(--base-clr);
            border-right: 1px solid var(--line-clr);

            position: sticky;
            top: 0;
            align-self: start;
            transition: 300ms ease-in-out;
            overflow: hidden;
            text-wrap: nowrap;

        }

        #sidebar.close {
            padding: 5px;
            width: 60px;
        }

        #sidebar ul {
            list-style: none;
        }

        #sidebar >ul >li:first-child {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
            .logo {
                font-weight: 600;
                font-size: 1.5em;
            
            }
        }

        #sidebar ul li.active a {
            background-color: rgb(248, 245, 245);
            
            svg {
                fill: var(--accent-clr);
            }
        }

        #sidebar a, #sidebar .dropdown-btn, #sidebar .logo {
            border-radius: 5em;
            padding: .85em;
            text-decoration: none;
            color: var(--text-clr);
            display: flex;
            align-items: center;
            gap: 1em;

            
        }

        .dropdown-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font: inherit;
            cursor: pointer;
        }

        #sidebar svg {
            flex-shrink: 0;
            fill: var(--text-clr);
        }

        #sidebar a span, #sidebar .dropdown-btn span {
            flex-grow: 1;
        }

        #sidebar a:hover {
            background-color: rgb(248, 245, 245);
        }

        #toggle-btn {
            margin-left: auto;
            padding: 1em;
            border: none;
            border-radius: .5em;
            background: none;
            cursor: pointer;

            svg {
                transition: rotate 150ms ease;

            }
        }

        #toggle-btn svg {
            transition: transform 150ms ease;

        }

        #toggle-btn.rotate svg {
            transform: rotate(-90deg);
        }

        #toggle-btn:hover {
            background-color: rgb(248, 245, 245);
        }
       

        main {
            padding: min(30px, 7%);
        }

        main p {
            color: var(--secondart-text-clr);
            margin-top: 5px;
            margin-bottom: 15px;
        }


        h2 {
            font-weight: 500;
        }

        

        @media(max-width: 800px) {
            body {
                grid-template-columns: 1fr;
            }

            main {
                padding: 2em 1em 60px 1em;
            }

            .container {
                border: none;
                padding: 0;
            }

            #sidebar {
                height: 60px;
                width: 100%;
                border-right: none;
                border-top: 1px solid var(--line-clr);
                padding: 0;
                position: fixed;
                top: unset;
                bottom: 0;
                
                > ul {
                    padding: 0;
                    display: grid;
                    grid-auto-columns: 60px;
                    grid-auto-flow: column;
                    align-items: center;
                    overflow-x: scroll;
                }

                ul li {
                    height: 100%;
                }

                ul a {
                    width: 60px;
                    height: 60px;
                    padding: 0;
                    border-radius: 0;
                    justify-content: center;
                }

                ul li span, ul li:first-child {
                    display: none;
                }

                >div {
                    overflow-x: auto;
                }

                li {
                    display: inline-flex;
                }

                a {
                    box-sizing: border-box;
                    padding: 1em;
                    width: auto;
                    justify-content: center;
                }
            }

            
        }



    </style>
</head>

    </nav>

    <main>
        <div class="container">
            <h2>Settings</h2>
            
        </div>    
    </main>

    <script>
        const toggleButton = document.getElementById('toggle-btn')
        const sidebar = document.getElementById('sidebar')

        function toggleSidebar() {
            sidebar.classList.toggle('close')
            toggleButton.classList.toggle('rotate')
        }
    </script>


    
</body>
</html>
