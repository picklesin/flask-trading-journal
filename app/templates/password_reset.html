<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>

  
    <style>
   
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-container {
            background: #fff;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 500px;
            box-sizing: border-box;
        }

        h4 {
            margin-bottom: 1rem;
            color: #333;
            font-size: 1.5rem;
        }

        p {
            font-size: 1.1rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

   

        input {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input:focus {
            outline: none;
            border-color: #000000;
        }

        input[type="submit"] {
            background: #2563Eb;
            color: white;
            border: none;
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #5281e6;
        }

        .messages p {
            color: red;
            font-size: 14px;
            text-align: start;
            margin-bottom: 0.5rem;
        }

        .back-btn {
            display: block;
            color: black;
            text-decoration: none;
            text-align: center;
            margin-top: 5px;
            padding: 8px;
            background-color: white;
            border: 1px solid;
            border-radius: 5px;
        }

        .back-btn:hover{
            background-color: rgb(232, 232, 232);
        }




    </style>
</head>
<body>


    <div class="card-container">

            <h4>Reset your password</h4>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class=messages>
                {% for message in get_flashed_messages() %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>

            <form method="POST" action="">
                {{ form.hidden_tag() }}
                {{ form.email() }}
                {{ form.submit() }}
                <a class="back-btn" href="{{ url_for('main.login') }}">Back</a>
            </form>

    </div>
</body>
</html>
